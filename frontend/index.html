<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vLLM Ascend Dashboard</title>
    
    <!-- Stripe Design System Fonts -->
    <!-- sohne-var (Primary Font) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Source Code Pro (Monospace) -->
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Fallback font configuration -->
    <style>
      /* Use DM Sans as fallback for sohne-var (similar geometric sans-serif) */
      :root {
        --font-primary: 'DM Sans', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
        --font-mono: 'Source Code Pro', 'SFMono-Regular', 'Consolas', monospace;
      }
      
      /* Apply font-feature-settings globally */
      html {
        font-feature-settings: "ss01" on;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
